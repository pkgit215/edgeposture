# RuleIQ — canonical label set.
# Consumed by `scripts/seed-github-labels.sh` which calls `gh label create`
# per row (idempotent — already-exists errors are swallowed).
- name: "priority:p0"
  color: "b60205"
  description: "Drop everything"
- name: "priority:p1"
  color: "d93f0b"
  description: "Current sprint"
- name: "priority:p2"
  color: "fbca04"
  description: "Next quarter"
- name: "priority:p3"
  color: "cccccc"
  description: "Backlog"

- name: "type:bug"
  color: "ee0701"
  description: "Something is broken"
- name: "type:feature"
  color: "1d76db"
  description: "New capability"
- name: "type:chore"
  color: "bfd4f2"
  description: "Cleanup, refactor, infra"
- name: "type:docs"
  color: "c5def5"
  description: "Documentation"
- name: "type:security"
  color: "b60205"
  description: "Security finding"

- name: "area:backend"
  color: "5319e7"
  description: "FastAPI / services"
- name: "area:frontend"
  color: "0e8a16"
  description: "React SPA"
- name: "area:pdf"
  color: "fbca04"
  description: "PDF audit report rendering"
- name: "area:methodology"
  color: "d4c5f9"
  description: "Methodology tab + PDF appendix"
- name: "area:scoring"
  color: "f9d0c4"
  description: "Severity / confidence / score calibration"
- name: "area:remediation"
  color: "bfe5bf"
  description: "Canned + per-account remediation"
- name: "area:iam"
  color: "fef2c0"
  description: "IAM roles, policies, STS"
- name: "area:deployment"
  color: "c2e0c6"
  description: "App Runner, ECS, infra rollouts"
- name: "area:multicloud"
  color: "1d76db"
  description: "Non-AWS WAF audits"
- name: "area:integrations"
  color: "5319e7"
  description: "Slack / email / scheduled / ZAP etc"

- name: "status:blocked"
  color: "b60205"
  description: "Waiting on external dep"
- name: "status:in-progress"
  color: "fbca04"
  description: "Actively being worked on"
- name: "status:needs-review"
  color: "0e8a16"
  description: "PR open, waiting on review"
- name: "good-first-issue"
  color: "7057ff"
  description: "Friendly entry point for new contributors"
