name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  # Configure as a repo variable: Settings → Secrets and variables →
  # Actions → Variables → AWS_ACCOUNT_ID. Fork-safe and scrubbed of PII.
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPO: ruleiq
  APP_RUNNER_SERVICE: ruleiq
  INSTANCE_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ruleiq-apprunner-instance
  ACCESS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ruleiq-apprunner-ecr-access
  PUBLIC_TEMPLATES_BUCKET: ruleiq-public-templates-${{ secrets.AWS_ACCOUNT_ID }}
  EXTERNAL_ID_SECRET_ARN: arn:aws:secretsmanager:us-east-1:${{ secrets.AWS_ACCOUNT_ID }}:secret:ruleiq/external-id-secret

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ruleiq-github-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI_SHA="$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          IMAGE_URI_LATEST="$REGISTRY/$ECR_REPO:latest"
          docker build -t "$IMAGE_URI_SHA" -t "$IMAGE_URI_LATEST" .
          docker push "$IMAGE_URI_SHA"
          docker push "$IMAGE_URI_LATEST"
          echo "IMAGE_URI_LATEST=$IMAGE_URI_LATEST" >> "$GITHUB_ENV"

      - name: Upload CFN customer-role template to public bucket
        run: |
          set -euo pipefail
          if aws s3api head-bucket --bucket "$PUBLIC_TEMPLATES_BUCKET" 2>/dev/null; then
            aws s3 cp cloudformation/customer-role.yaml \
              "s3://${PUBLIC_TEMPLATES_BUCKET}/customer-role.yaml" \
              --region "$AWS_REGION" \
              --content-type "application/x-yaml"
            echo "Uploaded to s3://${PUBLIC_TEMPLATES_BUCKET}/customer-role.yaml"
          else
            echo "WARNING: bucket ${PUBLIC_TEMPLATES_BUCKET} does not exist."
            echo "Run scripts/setup-public-bucket.sh once, then re-run this workflow."
          fi

      - name: Deploy to App Runner (create or update; race-safe)
        id: deploy
        env:
          IMAGE_URI_LATEST: ${{ env.IMAGE_URI_LATEST }}
        run: |
          set -euo pipefail

          # Single source-of-truth for the runtime config — used by both
          # create-service and update-service paths so existing deployments
          # pick up env-var / secret changes on every push.
          cat > /tmp/source-config.json <<JSON
          {
            "ImageRepository": {
              "ImageIdentifier": "$IMAGE_URI_LATEST",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": {
                "Port": "8080",
                "RuntimeEnvironmentVariables": {
                  "DEMO_MODE": "true"
                },
                "RuntimeEnvironmentSecrets": {
                  "EXTERNAL_ID_SECRET": "$EXTERNAL_ID_SECRET_ARN"
                }
              }
            },
            "AutoDeploymentsEnabled": true,
            "AuthenticationConfiguration": {
              "AccessRoleArn": "$ACCESS_ROLE_ARN"
            }
          }
          JSON

          SERVICE_ARN=$(aws apprunner list-services \
            --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE'].ServiceArn | [0]" \
            --output text)

          if [ "$SERVICE_ARN" = "None" ] || [ -z "$SERVICE_ARN" ]; then
            echo "Creating App Runner service '$APP_RUNNER_SERVICE'..."
            cat > /tmp/instance-config.json <<JSON
          {
            "Cpu": "0.25 vCPU",
            "Memory": "0.5 GB",
            "InstanceRoleArn": "$INSTANCE_ROLE_ARN"
          }
          JSON
            cat > /tmp/health-check.json <<'JSON'
          {
            "Protocol": "HTTP",
            "Path": "/api/health",
            "Interval": 10,
            "Timeout": 5,
            "HealthyThreshold": 1,
            "UnhealthyThreshold": 5
          }
          JSON
            CREATE_OUT=$(aws apprunner create-service \
              --region "$AWS_REGION" \
              --service-name "$APP_RUNNER_SERVICE" \
              --source-configuration file:///tmp/source-config.json \
              --instance-configuration file:///tmp/instance-config.json \
              --health-check-configuration file:///tmp/health-check.json)
            SERVICE_ARN=$(echo "$CREATE_OUT" | python -c "import json,sys;print(json.load(sys.stdin)['Service']['ServiceArn'])")
            SERVICE_URL=$(echo "$CREATE_OUT" | python -c "import json,sys;print(json.load(sys.stdin)['Service']['ServiceUrl'])")
          else
            STATUS=$(aws apprunner describe-service \
              --region "$AWS_REGION" \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "Service exists ($SERVICE_ARN) status=$STATUS"

            case "$STATUS" in
              RUNNING)
                # update-service reconciles RuntimeEnvironmentSecrets AND
                # triggers a deployment. Replaces the previous start-deployment
                # path so EXTERNAL_ID_SECRET propagates to the running service.
                echo "Calling update-service (reconciles secrets + redeploys)..."
                aws apprunner update-service \
                  --region "$AWS_REGION" \
                  --service-arn "$SERVICE_ARN" \
                  --source-configuration file:///tmp/source-config.json >/dev/null
                ;;
              OPERATION_IN_PROGRESS)
                echo "Auto-deployment already in progress (AutoDeploymentsEnabled+ECR push race) — skipping update-service this run; re-run workflow to reconcile env secrets."
                ;;
              CREATE_FAILED|DELETE_FAILED|DELETED|PAUSED)
                echo "ERROR: service in unexpected state '$STATUS' — aborting deploy."
                exit 1
                ;;
              *)
                echo "Service status '$STATUS' — proceeding without update-service."
                ;;
            esac

            SERVICE_URL=$(aws apprunner describe-service \
              --region "$AWS_REGION" \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.ServiceUrl' --output text)
          fi

          echo "SERVICE_ARN=$SERVICE_ARN" >> "$GITHUB_OUTPUT"
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Job summary
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.SERVICE_URL }}
          SERVICE_ARN: ${{ steps.deploy.outputs.SERVICE_ARN }}
        run: |
          {
            echo "## RuleIQ deploy"
            echo ""
            echo "- Image: \`${{ env.IMAGE_URI_LATEST }}\`"
            echo "- Service ARN: \`${SERVICE_ARN}\`"
            echo "- Service URL: https://${SERVICE_URL}"
            echo "- Health: https://${SERVICE_URL}/api/health"
            echo "- Setup info: https://${SERVICE_URL}/api/setup-info"
            echo "- CFN template: https://${PUBLIC_TEMPLATES_BUCKET}.s3.${AWS_REGION}.amazonaws.com/customer-role.yaml"
          } >> "$GITHUB_STEP_SUMMARY"
